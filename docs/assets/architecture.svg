<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">CiteSeal architecture</title>
  <desc id="desc">Local-first X media archive workflow from X page capture to archive, exports, API server, mobile review, and AI agents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#38bdf8"/>
    </marker>
    <style>
      .title { font: 800 42px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #f8fafc; }
      .subtitle { font: 500 20px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #94a3b8; }
      .box-title { font: 800 24px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #f8fafc; }
      .box-body { font: 500 16px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #cbd5e1; }
      .tag { font: 700 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #67e8f9; letter-spacing: .04em; }
      .note { font: 500 15px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #94a3b8; }
      .card { fill: url(#card); stroke: #334155; stroke-width: 1.4; filter: url(#shadow); }
      .accent { fill: #38bdf8; }
      .accent2 { fill: #a78bfa; }
      .accent3 { fill: #22c55e; }
      .line { stroke: #38bdf8; stroke-width: 3; fill: none; marker-end: url(#arrow); opacity: .9; }
      .soft-line { stroke: #475569; stroke-width: 2; fill: none; stroke-dasharray: 7 7; opacity: .75; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1090" cy="80" r="220" fill="#1d4ed8" opacity="0.12"/>
  <circle cx="130" cy="650" r="260" fill="#7c3aed" opacity="0.10"/>

  <text x="70" y="70" class="title">CiteSeal</text>
  <text x="70" y="106" class="subtitle">Local-first X/Twitter media archive for AI-agent content workflows</text>

  <!-- Row 1 cards -->
  <g transform="translate(70 170)">
    <rect class="card" width="220" height="150" rx="24"/>
    <circle class="accent" cx="36" cy="36" r="14"/>
    <text x="64" y="44" class="tag">SOURCE</text>
    <text x="28" y="84" class="box-title">X page</text>
    <text x="28" y="114" class="box-body">Status URL</text>
    <text x="28" y="138" class="box-body">Timeline sample</text>
  </g>

  <g transform="translate(365 170)">
    <rect class="card" width="230" height="150" rx="24"/>
    <circle class="accent" cx="36" cy="36" r="14"/>
    <text x="64" y="44" class="tag">CAPTURE</text>
    <text x="28" y="84" class="box-title">Playwright</text>
    <text x="28" y="114" class="box-body">Text + timestamp</text>
    <text x="28" y="138" class="box-body">Images + video</text>
  </g>

  <g transform="translate(675 150)">
    <rect class="card" width="270" height="190" rx="24"/>
    <circle class="accent3" cx="36" cy="36" r="14"/>
    <text x="64" y="44" class="tag">LOCAL ARCHIVE</text>
    <text x="28" y="84" class="box-title">Filesystem + JSONL</text>
    <text x="28" y="116" class="box-body">tweet.json</text>
    <text x="28" y="140" class="box-body">media/images/video/raw</text>
    <text x="28" y="164" class="box-body">indices by handle/date</text>
  </g>

  <g transform="translate(1020 170)">
    <rect class="card" width="190" height="150" rx="24"/>
    <circle class="accent2" cx="36" cy="36" r="14"/>
    <text x="64" y="44" class="tag">EXPORT</text>
    <text x="28" y="84" class="box-title">Artifacts</text>
    <text x="28" y="114" class="box-body">Markdown / PDF</text>
    <text x="28" y="138" class="box-body">OCR / transcode</text>
  </g>

  <!-- Arrows row 1 -->
  <path class="line" d="M300 245 C325 245, 335 245, 355 245"/>
  <path class="line" d="M605 245 C635 245, 645 245, 665 245"/>
  <path class="line" d="M955 245 C980 245, 995 245, 1010 245"/>

  <!-- Row 2 cards -->
  <g transform="translate(210 455)">
    <rect class="card" width="260" height="145" rx="24"/>
    <circle class="accent2" cx="36" cy="36" r="14"/>
    <text x="64" y="44" class="tag">LOCAL API</text>
    <text x="28" y="84" class="box-title">FastAPI server</text>
    <text x="28" y="114" class="box-body">Browse / edit / run jobs</text>
    <text x="28" y="138" class="box-body">Trusted LAN or USB</text>
  </g>

  <g transform="translate(535 455)">
    <rect class="card" width="260" height="145" rx="24"/>
    <circle class="accent3" cx="36" cy="36" r="14"/>
    <text x="64" y="44" class="tag">REVIEW</text>
    <text x="28" y="84" class="box-title">Phone / desktop</text>
    <text x="28" y="114" class="box-body">Browse source material</text>
    <text x="28" y="138" class="box-body">Trigger export jobs</text>
  </g>

  <g transform="translate(860 455)">
    <rect class="card" width="260" height="145" rx="24"/>
    <circle class="accent" cx="36" cy="36" r="14"/>
    <text x="64" y="44" class="tag">AI WORKFLOW</text>
    <text x="28" y="84" class="box-title">Agents & scripts</text>
    <text x="28" y="114" class="box-body">Summarize / tag / cite</text>
    <text x="28" y="138" class="box-body">Content + research loops</text>
  </g>

  <!-- Down / row 2 arrows -->
  <path class="line" d="M810 350 C810 390, 340 390, 340 445"/>
  <path class="line" d="M480 528 C500 528, 515 528, 525 528"/>
  <path class="line" d="M805 528 C825 528, 840 528, 850 528"/>
  <path class="soft-line" d="M945 350 C1010 380, 1030 410, 1000 450"/>

  <rect x="70" y="640" width="1140" height="1" fill="#334155"/>
  <text x="70" y="675" class="note">Responsible by design: user-owned browser session · local archive · no public scraping service · no access-control bypass</text>
</svg>
