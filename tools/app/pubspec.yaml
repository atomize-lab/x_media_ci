name: x_media_ci_app
description: x_media CI browser & remote runner for Win11 / Ubuntu22 / Android 14+
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  # photo_view / cached_network_image can be added when we wire media preview
  # dio: ^5.4.0          # used by the future "independent download" feature
  # file_picker: ^6.1.1  # used by the future "edit tweet.json" feature

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
