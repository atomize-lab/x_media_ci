name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Which artifact to build (workflow_dispatch only)"
        required: true
        default: "android"
        type: choice
        options:
          - android
          - all

permissions:
  contents: write

jobs:
  windows-exe:
    name: Windows server .exe
    if: github.event_name == 'push' || github.event.inputs.target == 'all'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/requirements.txt
          python -m pip install -r tools/server/requirements.txt
      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean tools/server/x_media_ci_server.spec
      - name: Verify exe
        run: |
          tools\dist\x_media_ci_server.exe &
          $env:X_MEDIA_CI_PORT = "8765"
          Start-Sleep -Seconds 5
          (Invoke-WebRequest -UseBasicParsing "http://127.0.0.1:8765/api/health").Content
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: x_media_ci_server-windows-x64
          path: tools/dist/x_media_ci_server.exe
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: tools/dist/x_media_ci_server.exe

  linux-tarball:
    name: Linux server .tar.gz
    if: github.event_name == 'push' || github.event.inputs.target == 'all'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build portable tarball
        run: bash tools/server/build_linux.sh
      - name: Smoke-test
        run: |
          tar -xzf tools/dist/x_media_ci_server-linux-x64.tar.gz -C /tmp
          X_MEDIA_CI_ROOT=$PWD/../accounts /tmp/x_media_ci_server-linux-x64/bin/run.sh &
          sleep 5
          curl -sf http://127.0.0.1:8765/api/health
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: x_media_ci_server-linux-x64
          path: tools/dist/x_media_ci_server-linux-x64.tar.gz
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: tools/dist/x_media_ci_server-linux-x64.tar.gz

  android-apk:
    name: Android 14+ APK
    if: github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'android'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable
      - run: flutter --version
      - run: flutter doctor -v
      - name: Bootstrap Flutter project
        working-directory: tools/app
        run: |
          flutter create . --project-name x_media_ci_app --platforms=android --overwrite
          git -C ../.. checkout -- tools/app/lib tools/app/pubspec.yaml tools/app/analysis_options.yaml
          flutter pub get
      - name: Patch Android Kotlin version
        working-directory: tools/app
        shell: bash
        run: |
          set -euo pipefail
          # Some Flutter templates still use older Kotlin plugin versions, but
          # modern plugins (e.g. shared_preferences_android) require Kotlin 1.9+.
          if [ -f android/build.gradle ]; then
            sed -i -E "s/(ext\\.kotlin_version\\s*=\\s*)'[^']+'/(\\1)'1.9.22'/g" android/build.gradle || true
          fi
          # Newer Gradle templates use plugin DSL in settings.gradle(.kts)
          for f in android/settings.gradle android/settings.gradle.kts android/build.gradle.kts; do
            if [ -f \"$f\" ]; then
              sed -i -E \"s/(org\\.jetbrains\\.kotlin\\.android\\\"\\s+version\\s+\\\")([0-9.]+)(\\\")/\\11.9.22\\3/g\" \"$f\" || true
              sed -i -E \"s/(kotlin\\(\\\"android\\\"\\)\\s+version\\s+\\\")([0-9.]+)(\\\")/\\11.9.22\\3/g\" \"$f\" || true
            fi
          done
      - name: Build release APK
        working-directory: tools/app
        run: flutter build apk --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: x_media_ci_app-android-release
          path: tools/app/build/app/outputs/flutter-apk/app-release.apk
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: tools/app/build/app/outputs/flutter-apk/app-release.apk
