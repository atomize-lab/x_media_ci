name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Which artifact to build (workflow_dispatch only)"
        required: true
        default: "android"
        type: choice
        options:
          - android
          - all

permissions:
  contents: write

jobs:
  windows-exe:
    name: Windows server .exe
    if: github.event_name == 'push' || github.event.inputs.target == 'all'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/requirements.txt
          python -m pip install -r tools/server/requirements.txt
          python -m pip install pyinstaller
      - name: Build with PyInstaller
        run: python -m PyInstaller --noconfirm --clean --distpath tools/dist --workpath tools/build tools/server/citeseal_server.spec
      - name: Verify exe
        run: |
          $env:CITESEAL_PORT = "8765"
          $env:CITESEAL_ROOT = (Resolve-Path "tests/fixtures/accounts/example_user/tweets/2026/2026-07/20260708_180000_1234567890").Path
          $originalPath = $env:PATH
          $server = $null
          try {
            # The frozen process and its CLI child must not discover host Python.
            $env:PATH = "$env:SystemRoot\System32"
            $server = Start-Process -FilePath "tools/dist/citeseal_server.exe" -PassThru
            $env:PATH = $originalPath
            python tools/server/smoke_test_server.py `
              --root "$env:CITESEAL_ROOT" --timeout 45
            if ($LASTEXITCODE -ne 0) { throw "Windows frozen smoke test failed" }
          } finally {
            $env:PATH = $originalPath
            if ($null -ne $server) {
              Stop-Process -Id $server.Id -Force -ErrorAction SilentlyContinue
            }
          }
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: citeseal_server-windows-x64
          path: tools/dist/citeseal_server.exe
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: tools/dist/citeseal_server.exe

  linux-tarball:
    name: Linux server .tar.gz
    if: github.event_name == 'push' || github.event.inputs.target == 'all'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build portable tarball
        run: bash tools/server/build_linux.sh
      - name: Verify and smoke-test
        run: |
          python tools/server/verify_linux_tarball.py tools/dist/citeseal_server-linux-x64.tar.gz
          rm -rf /tmp/citeseal_server-linux-x64
          tar -xzf tools/dist/citeseal_server-linux-x64.tar.gz -C /tmp
          PATH=/nonexistent \
            CITESEAL_HOST=127.0.0.1 CITESEAL_PORT=8765 \
            CITESEAL_ROOT="$PWD/tests/fixtures/accounts/example_user/tweets/2026/2026-07/20260708_180000_1234567890" \
            /tmp/citeseal_server-linux-x64/bin/citeseal_server &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          python tools/server/smoke_test_server.py \
            --root "$PWD/tests/fixtures/accounts/example_user/tweets/2026/2026-07/20260708_180000_1234567890" --timeout 45
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: citeseal_server-linux-x64
          path: tools/dist/citeseal_server-linux-x64.tar.gz
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: tools/dist/citeseal_server-linux-x64.tar.gz

  android-apk:
    name: Android 14+ APK
    if: github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'android'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable
      - run: flutter --version
      - run: flutter doctor -v
      - name: Bootstrap Flutter project
        working-directory: tools/app
        run: |
          flutter create . --project-name citeseal_app --platforms=android --overwrite
          git -C ../.. checkout -- tools/app/lib tools/app/pubspec.yaml tools/app/analysis_options.yaml
          flutter pub get
      - name: Patch Android Kotlin version
        working-directory: tools/app
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          
          root = Path("android")
          targets = [
              root / "build.gradle",
              root / "settings.gradle",
              root / "settings.gradle.kts",
              root / "build.gradle.kts",
          ]
          
          def patch(p: Path) -> bool:
              if not p.exists():
                  return False
              s = p.read_text(encoding="utf-8", errors="replace")
              orig = s
              # Groovy: ext.kotlin_version = '1.7.10'
              s = re.sub(r"(ext\.kotlin_version\s*=\s*)'[^']+'", r"\g<1>'1.9.22'", s)
              s = re.sub(r'(ext\.kotlin_version\s*=\s*)"[^"]+"', r'\g<1>"1.9.22"', s)
              s = re.sub(r"(kotlin_version\s*=\s*)'[^']+'", r"\g<1>'1.9.22'", s)
              s = re.sub(r'(kotlin_version\s*=\s*)"[^"]+"', r'\g<1>"1.9.22"', s)

              # Groovy plugin DSL:
              #   id "org.jetbrains.kotlin.android" version "1.7.10" apply false
              #   id "org.jetbrains.kotlin.android" version '1.7.10'
              #   id 'org.jetbrains.kotlin.android' version "1.7.10"
              #   id 'org.jetbrains.kotlin.android' version '1.7.10'
              s = re.sub(
                  r'(id\s+"org\.jetbrains\.kotlin\.android"\s+version\s+)(["\'])[0-9.]+\2',
                  r'\g<1>"1.9.22"',
                  s,
              )
              s = re.sub(
                  r"(id\s+'org\.jetbrains\.kotlin\.android'\s+version\s+)(['\"])[0-9.]+\2",
                  r"\g<1>'1.9.22'",
                  s,
              )

              # Kotlin DSL: id("org.jetbrains.kotlin.android") version "1.7.10"
              s = re.sub(
                  r'(id\("org\.jetbrains\.kotlin\.android"\)\s+version\s+)(["\'])[0-9.]+\2',
                  r'\g<1>"1.9.22"',
                  s,
              )
              s = re.sub(
                  r"(id\('org\.jetbrains\.kotlin\.android'\)\s+version\s+)(['\"])[0-9.]+\2",
                  r"\g<1>'1.9.22'",
                  s,
              )

              # Kotlin DSL shortcut: kotlin("android") version "1.7.10" / '1.7.10'
              s = re.sub(
                  r'(kotlin\("android"\)\s+version\s+)(["\'])[0-9.]+\2',
                  r'\g<1>"1.9.22"',
                  s,
              )

              # Legacy classpath:
              #   classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.7.10"
              s = re.sub(
                  r'(org\.jetbrains\.kotlin:kotlin-gradle-plugin:)[0-9.]+',
                  r'\g<1>1.9.22',
                  s,
              )
              if s != orig:
                  p.write_text(s, encoding="utf-8")
                  return True
              return False
          
          changed = [str(p) for p in targets if patch(p)]
          print("patched:", changed)

          manifest = root / "app" / "src" / "main" / "AndroidManifest.xml"
          if manifest.exists():
              s = manifest.read_text(encoding="utf-8", errors="replace")
              if "android.permission.INTERNET" not in s:
                  m = re.search(r"(<manifest[^>]*>)", s)
                  if m:
                      insert = m.group(1) + "\n    <uses-permission android:name=\"android.permission.INTERNET\"/>"
                      s2 = s.replace(m.group(1), insert, 1)
                      manifest.write_text(s2, encoding="utf-8")
                      print("patched:", str(manifest))
          PY
      - name: Show Kotlin plugin version (debug)
        working-directory: tools/app
        shell: bash
        run: |
          set -euo pipefail
          echo "---- android/settings.gradle (kotlin lines) ----"
          if [ -f android/settings.gradle ]; then grep -n "kotlin" android/settings.gradle || true; fi
          echo "---- android/settings.gradle.kts (kotlin lines) ----"
          if [ -f android/settings.gradle.kts ]; then grep -n "kotlin" android/settings.gradle.kts || true; fi
          echo "---- android/build.gradle (kotlin lines) ----"
          if [ -f android/build.gradle ]; then grep -n "kotlin" android/build.gradle || true; fi
          echo "---- assert kotlin plugin is 1.9.22 ----"
          if [ -f android/settings.gradle ]; then
            grep -n 'org\.jetbrains\.kotlin\.android' android/settings.gradle || true
            grep -q 'org\.jetbrains\.kotlin\.android.*1\.9\.22' android/settings.gradle || {
              echo "ERROR: kotlin plugin version not patched to 1.9.22 in android/settings.gradle"
              exit 1
            }
          fi
      - name: Build release APK
        working-directory: tools/app
        run: flutter build apk --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: citeseal_app-android-release
          path: tools/app/build/app/outputs/flutter-apk/app-release.apk
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: tools/app/build/app/outputs/flutter-apk/app-release.apk
