name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  lint-validate:
    name: lint + validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/requirements.txt
          python -m pip install pyflakes
          python -m pip install -r requirements-dev.txt

      - name: pyflakes
        shell: bash
        working-directory: tools
        run: python citeseal.py lint

      - name: validate test fixtures
        shell: bash
        run: |
          # Validate only the good fixture (dirty/invalid are for pytest)
          python tools/scripts/tweet_validate.py \
            tests/fixtures/accounts/example_user/tweets/2026/2026-07/20260708_180000_1234567890

      - name: pytest
        shell: bash
        run: python -m pytest tests/ -v --tb=short
